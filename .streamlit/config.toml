[theme]
# Recreo-inspired palette — cream surface + burgundy panel + pink accent
primaryColor = "#e94e77"
backgroundColor = "#f4f1ec"
secondaryBackgroundColor = "#faf6f1"
textColor = "#2d0e17"
font = "sans serif"
base = "light"

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"

[server]
# Cap upload size at 80 MB. Streamlit Cloud free tier (~1 GB RAM) OOMs when
# python-pptx + LibreOffice extract a much larger deck. App.py adds a softer
# hard-reject at 50 MB with a helpful "compress images" message.
maxUploadSize = 80
