[theme]
# Recreo-inspired palette — cream surface + burgundy panel + pink accent
primaryColor = "#e94e77"
backgroundColor = "#f4f1ec"
secondaryBackgroundColor = "#faf6f1"
textColor = "#2d0e17"
font = "sans serif"
base = "light"

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"

[server]
# Cap upload size at 45 MB. Streamlit Cloud free tier (~1 GB RAM) OOMs when
# python-pptx + LibreOffice extract a much larger deck. 45 MB leaves ~300 MB
# headroom for thumbnail rasterisation (LibreOffice peaks ~350-400 MB on a
# 45 MB deck). App.py mirrors this with a softer hard-reject + friendly
# "compress images" message.
maxUploadSize = 45
